      var nn=0;
      function addFile(){
          var inputList = document.getElementById('add_file');
          var divNode = inputList.getElementsByTagName('input');
          var pageNum = divNode.length;
          if (pageNum>8){
              return false;
          }
          var html = '<div id="item_'+nn+'"><input name="fileadd'+pageNum+'" type="file" /><a href="javascript:;" onclick="del_coo_item('+nn+')" style="color: red">X</a></div>';
          $("#add_file").append(html);
          nn++;
      }


      //审批申请
      function check_apply6(appid){
          $("#appid6").val(appid);
          $("#myModal6").modal('show');
      }

      function check_data6(){
          return  true;
      }


      function del_coo_item(i){
          $("#item_"+i).remove();
      }
