  <script>
      var nn=0;
      function addFile(){
          var inputList = document.getElementById('add_file');
          var divNode = inputList.getElementsByTagName('input');
          var pageNum = divNode.length;
          if (pageNum>8){
              return false;
          }
          var html = '<div id="item_'+nn+'"><input name="fileadd'+pageNum+'" type="file" /><a onclick="del_coo_item('+nn+')" style="color: red">X</a></div>';
          $("#add_file").append(html);
          nn++;
      }

      function del_coo_item(i){
          $("#item_"+i).remove();
      }
  </script>
