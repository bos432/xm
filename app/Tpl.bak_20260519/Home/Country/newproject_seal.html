<script type="text/javascript">
    $("[rel=tooltip]").tooltip();
    $(function() {
        $('.demo-cancel-click').click(function(){return false;});
    });

    layui.use('upload', function(){
        var upload = layui.upload;
        //执行实例
        var uploadInst = upload.render({
            elem: '#signupload' //绑定元素
            ,url: 'index.php?m=country&a=newproject_seal&id={$id}' //上传接口
            ,done: function(res){
                //上传完毕回调
                if (res.status==1){
                    $("#pic").show();
                    $("#pic_a").show();
                    $("#img1").val(res.msg);
                    $("#pic").attr("src", res.msg);
                }else {
                    layer.msg(res.msg)
                }
            }
            ,error: function(){
                //请求异常回调
            }
        });
        $(".layui-upload-file").hide();
    });

</script>
