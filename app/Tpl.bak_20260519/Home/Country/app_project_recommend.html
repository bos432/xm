    <script type="text/javascript">
        var ue = UE.getEditor('editor');
        $("[rel=tooltip]").tooltip();
        $(function() {
            $('.demo-cancel-click').click(function(){return false;});
        });

        //审批申请
        function check_apply(appid){
            $("#appid").val(appid);
            $("#myModal1").modal('show');
        }

        function check_apply2(appid){
            $("#appid2").val(appid);
            $("#myModal2").modal('show');
        }

        function checkdata(){

            var experts = new Array();
            $("input[name='experts[]']:checkbox[checked]").each(function(i){
                experts[i] = $(this).val();
            });
            if (experts.length==0){
                layer.msg("请选择专家");
                return false;
            }
            return true;
        }


        function checkdata2(){
            var Content =  ue.getContent();
            Content = Content.trim();
            if (Content==""||Content==null){
                layer.msg("备注不能为空！");
                return  false;
            }

            return true;
        }


        //审批申请
        function check_apply3(appid){
            $("#appid3").val(appid);
            $("#myModal3").modal('show');
        }

        var role_id = "<?php echo $_COOKIE['role_id'];?>"
        function setMoneydiv(){
            var  support = $("#support").val();
            if (support=="是" && role_id==3){
                $("#div_money").show();
            }else{
                $("#div_money").hide();
            }
        }

        if (role_id==1){
            $("#div_money").hide();
        }

        function check_data3(){
            var  support = $("#support").val();
            var  support_money = $("#support_money").val();

            if (support=="是" && role_id==3){
                if (support_money<0){
                    layer.msg('请填写支持金额!');
                    return false;
                }
            }

            var experts_pifu =$("#experts_pifu").val();
            if (experts_pifu==""){
                layer.msg('审核备注不能为空!');
                return false;
            }
            return  true;
        }
    </script>
