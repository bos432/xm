	<script>

		jQuery(document).ready(function(){
			jQuery("#formID").validationEngine('attach');
		});

        var myreg_email = /^([\.a-zA-Z0-9_-])+@([a-zA-Z0-9_-])+(\.[a-zA-Z0-9_-])+/;
        var myreg_phone = /^(((13[0-9])|(14[5-9])|(15[0-3])|(15[5-9])|(166)|(17[0-8])|(18[0-9])|(19[8-9]))+\d{8})$/;
        //身份证号验证
        function check_idcard(value)
        {
            var reg=/^(\d{15}$|^\d{18}$|^\d{17}(\d|X|x))$/;
            var re = new RegExp(reg);
            if (re.test(value)) {
                return true;
            } else {
                return false;
            }
        }

        function checkdata(){

            var idcard = $("#idcard").val();
            if (idcard==null||idcard==""){
                layer.msg("请输入身份证");
                return false;
            }else if (!check_idcard(idcard)){
                message = "请输入正确的身份证号！";
                layer.msg(message);
                return false;
            }

            var password  =  $("#password").val();
            var repassword  =  $("#repassword").val();
            if (password==""||password==null){
                layer.msg("密码不能为空！");
                return false;
            }
            if (password!=repassword){
                layer.msg("俩次输入的密码不一致");
                return false;
            }
            if (password.length<6||password.length>32){
                layer.msg("密码长度在6-32位之间");
                return false;
            }

            var nick_name  =  $("#nick_name").val();
            if (nick_name==""||nick_name==null){
                layer.msg("姓名不能为空！");
                return false;
            }

            var phone  =  $("#phone").val();
            if (phone==""||phone==null){
                layer.msg("联系电话不能为空！");
                return false;
            }else if(!myreg_phone.test(phone)){
                message = "请输入有效的手机号码！";
                layer.msg(message);
                return false;
            }

               var email = $("#email").val();
                if(!myreg_email.test(email)){
                    layer.msg("请输入正确的邮箱地址");
                    return false;
                }

            var  company  =  $("#company").val();
            if (company==""||company==null){
                layer.msg("所在单位不能为空！");
                return false;
            }

            var  zhicheng  =  $("#zhicheng").val();
            if (zhicheng==""||zhicheng==null){
                layer.msg("职称不能为空！");
                return false;
            }

            var achieve = new Array();
            $("input[name='classfi[]']:checkbox[checked]").each(function(i){
                achieve[i] = $(this).val();
            });
            if (achieve.length==0){
                layer.msg("请选择擅长领域！");
                return false;
            }
            var xieyi =  $('input[id=xieyi]:checked').length;
            if (xieyi!=1){
                layer.msg("请先同意注册协议！");
                return false;
            }
            return true;
        }

    </script>
