<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- Always force latest IE rendering engine (even in intranet) & Chrome Frame
   Remove this if you use the .htaccess -->
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
<meta name="viewport" content="initial-scale=1.0, target-densitydpi=device-dpi" /><!-- this is for mobile (Android) Chrome -->
<meta name="viewport" content="initial-scale=1.0, width=device-height"><!--  mobile Safari, FireFox, Opera Mobile  -->

	<link rel="stylesheet" type="text/css" href="public/lib/bootstrap/css/bootstrap.css">
	<link rel="stylesheet" type="text/css" href="public/stylesheets/theme.css">
	<link rel="stylesheet" href="public/lib/font-awesome/css/font-awesome.css">
	<script src="public/lib/jquery-1.7.2.min.js" type="text/javascript"></script>

</head>
<body>
	<div>
		<div id="content">
				<form  role="form"  method="post" onsubmit="return false" id="form1">
					<div class="modal-body" >
						<input name="pro_id" type="hidden" id="pro_id" value="{$id}" />

							<div class="form-group">
								<span for="state" style="width: 100px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;物资名称：</span>
								<input  type="text" class="form-control" id="name" name="name" placeholder=""/>
							</div>

							<div class="form-group">
								<span for="sex" style="width: 100px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;型号规格：</span>
								<input  type="text" class="form-control" id="spec_model" name="spec_model" placeholder=""/>
							</div>

						<div class="form-group">
							<span for="age" style="width: 100px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;物资单价：</span>
							<input type="text" class="form-control"  onkeyup="value=value.replace(/^\D*(\d*(?:\.\d{0,2})?).*$/g, '$1')" onblur="getMoney1()"    id="price" name="price" placeholder=""/>元
						</div>

						<div class="form-group">
							<span for="duty" style="width: 100px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;物资数量：</span>
							<input type="number" class="form-control"  id="num" name="num" onblur="getMoney1()" placeholder=""/>
						</div>

						<div class="form-group">
							<span for="education" style="width: 100px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;物资总价：</span>
							<input type="text" class="form-control"  id="money" name="money"  readonly/>万元
						</div>


						<div class="form-group">
							<span for="note" style="width: 100px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;物资用途：</span>
							<textarea type="text" class="form-control" style="width: 200px;height: 100px" id="note" name="note" placeholder=""></textarea>
						</div>

					</div>

					<div class="modal-footer">
						<button class="btn btn-primary" type="submit" onclick="checkData()">添加</button>
					</div>
				</form>
		</div>
	</div>
	<script src="public/country/lib/bootstrap/js/bootstrap.js"></script>
	<script src="lib/layer/layer.js"></script>
<script>


	function getMoney1(){
		var num   = $("#num").val();
		var price = $("#price").val();

		var money = num*price;
		money = (money/10000).toFixed(2);
		$("#money").val(money);

	}

	function checkData(){

		var name = $("#name").val();
		if (name==""||name==null){
			layer.msg("请填写物资名称");
			return false;
		}

		var spec_model = $("#spec_model").val();
		if (spec_model==""||spec_model==null){
			layer.msg("请填写物资规格型号");
			return false;
		}


		var price = $("#price").val();
		if (price==""||price==null){
			layer.msg("请填写物资单价");
			return false;
		}

		var num = $("#num").val();
		if (num==""||num==null||num==0){
			layer.msg("请填写物资数量");
			return false;
		}


		var note = $("#note").val();
		if (note==""||note==null){
			layer.msg("请填写物资用途");
			return false;
		}

		var money = num*price;
		money = (money/10000).toFixed(2);
		$("#money").val(money);

		$.ajax({
			type: "POST",//方法类型
			dataType: "json",
			url: "/index.php?m=Unit&a=add_goods" ,
			data: $('#form1').serialize(),
			success: function (result) {
				console.log(result);
				if (result.status == 1) {
					layer.msg("添加成功！");
					setTimeout(function (){
						parent.closeLayer();
					}, 1500);
				};
			},
			error : function() {
				alert("异常！");
			}
		});
	}
</script>
</body>
</html>
