<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- Always force latest IE rendering engine (even in intranet) & Chrome Frame
   Remove this if you use the .htaccess -->
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
<meta name="viewport" content="initial-scale=1.0, target-densitydpi=device-dpi" /><!-- this is for mobile (Android) Chrome -->
<meta name="viewport" content="initial-scale=1.0, width=device-height"><!--  mobile Safari, FireFox, Opera Mobile  -->

	<link rel="stylesheet" type="text/css" href="public/lib/bootstrap/css/bootstrap.css">
	<link rel="stylesheet" type="text/css" href="public/stylesheets/theme.css">
	<link rel="stylesheet" href="public/lib/font-awesome/css/font-awesome.css">
	<script src="public/lib/jquery-1.7.2.min.js" type="text/javascript"></script>

</head>
<body>
	<div>
		<div id="content">
				<form  role="form"  method="post" onsubmit="return false" id="form1">
					<div class="modal-body" >
						<input name="pro_id" type="hidden" id="pro_id" value="{$id}" />

							<div class="form-group">
								<span for="state" style="width: 100px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;姓名：</span>
								<input  type="text" class="form-control" id="name" name="name" placeholder=""/>
							</div>

							<div class="form-group">
								<span for="sex" style="width: 100px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;性别：</span>
									<div class="radio-inline" style="display: inline-block">
										<label for="sex"><input type="radio" name="sex" id="sex" checked value="男" >男</label>
									</div>
									<div class="radio-inline" style="display: inline-block">
										<label for="sex"><input type="radio" name="sex"  id="sex" value="女" >女</label>
									</div>
							</div>

						<div class="form-group">
							<span for="age" style="width: 100px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;年龄：</span>
							<input type="text" class="form-control"  id="age" name="age" placeholder=""/>
						</div>

						<div class="form-group">
							<span for="duty" style="width: 100px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;职称：</span>
							<input type="text" class="form-control"  id="duty" name="duty" placeholder=""/>
						</div>

						<div class="form-group">
							<span for="education" style="width: 100px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;学历：</span>
							<select class="form-control" name="education" id="education">
								<option value="">---</option>
								<volist name='edu' id='edu' key="key">
									<option value="{$edu.v}">{$edu.v}</option>
								</volist>
							</select>
						</div>

						<div class="form-group">
							<span for="degree" style="width: 100px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;学位：</span>
							<select class="form-control"  name="degree" id="degree">
								<option value="">---</option>
								<option value="学士">学士学位</option>
								<option value="硕士">硕士学位</option>
								<option value="博士">博士学位</option>
							</select>
						</div>

						<div class="form-group">
							<span for="idcard" style="width: 100px;">证件号码：</span>
							<input type="text" class="form-control"  id="idcard" name="idcard" placeholder=""/>
						</div>

						<div class="form-group">
							<span for="profession" style="width: 100px;">从事专业：</span>
							<input type="text" class="form-control"  id="profession" name="profession" placeholder=""/>
						</div>
						<div class="form-group">
							<span for="company" style="width: 100px;">所在单位：</span>
							<input type="text" class="form-control"  id="company" name="company" placeholder=""/>
						</div>
						<div class="form-group">
							<span for="sex" style="width: 100px;">是负责人：</span>
							<div class="radio-inline" style="display: inline-block">
								<label for="is_head"><input type="radio" name="is_head" id="is_head" value="1">是</label>
							</div>
							<div class="radio-inline" style="display: inline-block">
								<label for="is_head"><input type="radio" name="is_head"  id="is_head" checked value="0">否</label>
							</div>
						</div>
						<div class="form-group">
							<span for="note" style="width: 100px;">成就经历：</span>
							<textarea type="text" class="form-control" style="width: 200px;height: 100px" id="note" name="note" placeholder=""></textarea>
						</div>

					</div>

					<div class="modal-footer">
						<button class="btn btn-primary" type="submit" onclick="checkData()">添加</button>
					</div>
				</form>
		</div>
	</div>
	<script src="public/country/lib/bootstrap/js/bootstrap.js"></script>
	<script src="lib/layer/layer.js"></script>
<script>

	function checkData(){

		var name = $("#name").val();
		if (name==""||name==null){
			layer.msg("请填写姓名");
			return false;
		}

		var age = $("#age").val();
		if (age==""||age==null){
			layer.msg("请填写年龄");
			return false;
		}


		var education = $("#education").val();
		if (education==""||education==null){
			layer.msg("请填写学历");
			return false;
		}



		var idcard = $("#idcard").val();
		if (idcard==""||idcard==null){
			layer.msg("请填写证件号码");
			return false;
		}

		var profession = $("#profession").val();
		if (profession==""||profession==null){
			layer.msg("请填写专业");
			return false;
		}

		var company = $("#company").val();
		if (company==""||company==null){
			layer.msg("请填写所在单位");
			return false;
		}

		$.ajax({
			type: "POST",//方法类型
			dataType: "json",
			url: "/index.php?m=Unit&a=add_member" ,
			data: $('#form1').serialize(),
			success: function (result) {
				console.log(result);
				if (result.status == 1) {
					layer.msg("添加成功！");
					setTimeout(function (){
						parent.closeLayer();
					}, 1500);
				};
			},
			error : function() {
				alert("异常！");
			}
		});
	}
</script>
</body>
</html>
