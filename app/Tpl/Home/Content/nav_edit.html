        $("[rel=tooltip]").tooltip();
        $(function() {
            $('.demo-cancel-click').click(function(){return false;});
            get_div();
        });

        function get_div(){
          var role =   $("#select_role").val();
          if (role*1==1){
              $("#classfi_div").hide();
              $("#region_div").show();
          }else if (role*1==2){
              $("#classfi_div").show();
              $("#region_div").hide();
          }else if (role*1==3){
              $("#classfi_div").hide();
              $("#region_div").hide();
          }

        }
