    <script type="text/javascript">
        $("[rel=tooltip]").tooltip();
        $(function() {
            $('.demo-cancel-click').click(function(){return false;});
            get_div();
        });


        var myreg_email = /^([\.a-zA-Z0-9_-])+@([a-zA-Z0-9_-])+(\.[a-zA-Z0-9_-])+/;
        var myreg_phone = /^(((13[0-9])|(14[5-9])|(15[0-3])|(15[5-9])|(166)|(17[0-8])|(18[0-9])|(19[8-9]))+\d{8})$/;
        //身份证号验证
        function check_idcard(value)
        {
            var reg=/^(\d{15}$|^\d{18}$|^\d{17}(\d|X|x))$/;
            var re = new RegExp(reg);
            if (re.test(value)) {
                return true;
            } else {
                return false;
            }
        }


        function checkdata(){
            var user_name  =  $("#user_name").val();
            if (user_name==""||user_name==null){
                layer.msg("用户名不能为空！");
                return false;
            }

            var password  =  $("#password").val();
            if (password==""||password==null){
                layer.msg("密码不能为空！");
                return false;
            }

            var nick_name  =  $("#nick_name").val();
            if (nick_name==""||nick_name==null){
                layer.msg("联系人不能为空！");
                return false;
            }


            var message = "";

            var head_phone = $("#phone").val();
            if (head_phone ==""||head_phone==null){
                layer.msg("请输入手机号");
                return false;
            } else if(head_phone.length != 11){
                message = "请输入有效的手机号码！"
                layer.msg(message);
                return false;
            }else if(!myreg_phone.test(head_phone)){
                message = "请输入有效的手机号码！";
                layer.msg(message);
                return false;
            }

            var email = $("#email").val();
            if (email!=""&&email!=""){
                if(!myreg_email.test(email)){
                    layer.msg("请输入正确的邮箱地址");
                    return false;
                }
            }

            var role      = $("#select_role").val();
            var region_id = $("#region_id").val();
            var idcard = $("#idcard").val();
            if (role*1==1||role*1==0){
                if (region_id<=0||region_id==""){
                    layer.msg("请选择部门！");
                    return false;
                }
            }else if (role*1==2){
                if (idcard==null||idcard==""){
                    layer.msg("请输入身份证");
                    return false;
                }
            }
        }

        function get_div(){
            var role =   $("#select_role").val();
            if (role*1==0){
                $("#classfi_div").hide();
                $("#region_div").show();
            }else if (role*1==1){
                $("#classfi_div").hide();
                $("#region_div").show();
            }else if (role*1==2){
                $("#classfi_div").show();
                $("#region_div").hide();
            }else if (role*1==3){
                $("#classfi_div").hide();
                $("#region_div").hide();
            }
        }

    </script>
