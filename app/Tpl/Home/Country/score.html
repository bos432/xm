    <script type="text/javascript">
        $("[rel=tooltip]").tooltip();
        $(function() {
            $('.demo-cancel-click').click(function(){return false;});
            $(".layui-upload-file").hide();
        });

        layui.use('upload', function(){
            var upload = layui.upload;
            //执行实例
            var uploadInst = upload.render({
                elem: '#signupload' //绑定元素
                ,url: 'index.php?m=Country&a=zhuanjiaSign' //上传接口
                ,done: function(res){
                    //上传完毕回调
                    if (res.status==1){
                        $("#imgsign").show();
                        $("#img1").val(res.msg);
                        $("#img2").val(res.msg);
                        $("#imgsign").attr("src", res.msg);
                    }else {
                        layer.msg(res.msg)
                    }
                }
                ,error: function(){
                    //请求异常回调
                }
            });
            $(".layui-upload-file").hide();
        });

        function addsign(){
            layer.open({
                type: 2,
                skin: '',
                area: ['520px', '340px'],
                content: '/index.php?m=Content&a=jssign',
                success: function (layero, index) {

                },
            });
            $(".layui-layer-title").text("电子签名");
        }

        function savesign(img1,img2) {
            $("#imgsign").show();
            $("#img1").val(img1);
            $("#img2").val(img2);
            $("#imgsign").attr("src", img2);
            layer.closeAll();
        }

        function checkData(){
            var img1 = $("#img1").val();
            if (img1==""){
                layer.msg("请添加电子签名！");
                return false;
            }
            return true;
        }
    </script>
