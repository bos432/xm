# Example only. Adjust paths, hostnames, certificates, and upstream ports before use.

server {
    listen 80;
    server_name new-xm.example.test;

    root /www/wwwroot/xm-modern/current/backend/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

server {
    listen 80;
    server_name old-xm-readonly.example.test;

    root /www/wwwroot/xm.zlck888.com;
    index index.php;

    location ~* ^/(upload|uploads|img|images|js|css|excel|ueditor/php/upload)/.*\.(php|phtml|phar|jsp|asp|aspx)$ {
        deny all;
    }

    location ~* \.(infected|bak|old)$ {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # Restrict old admin/write paths separately before production use.
        fastcgi_pass unix:/run/php/legacy-php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }
}

